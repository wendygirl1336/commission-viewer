<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>보험 수수료 조회</title>
  <style>
    :root {
      --point: #DAAD41;
      --point-dark: #b98d25;
      --ink: #111111;
      --muted: #6b7280;
      --line: #e5e7eb;
      --white: #ffffff;
      --shadow: 0 12px 32px rgba(17, 17, 17, 0.06);
      --danger: #b42318;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", Arial, sans-serif;
      color: var(--ink);
      background: var(--white);
      letter-spacing: 0;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .page {
      min-height: 100vh;
      background: var(--white);
    }

    .app-header {
      height: 96px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 28px 18px;
      background: var(--white);
    }

    .brand {
      display: flex;
      align-items: center;
      min-width: 260px;
    }

    .brand-logo {
      display: block;
      width: 254px;
      height: auto;
    }

    .header-actions {
      position: relative;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #3f3f3f;
    }

    .login-badge {
      display: none;
      min-height: 28px;
      align-items: center;
      padding: 0 10px;
      border: 1px solid rgba(218, 173, 65, 0.5);
      border-radius: 999px;
      background: rgba(218, 173, 65, 0.12);
      color: var(--point-dark);
      font-size: 13px;
      font-weight: 800;
    }

    body.auth-mode .login-badge {
      display: inline-flex;
    }

    .user-button {
      width: 42px;
      height: 42px;
      border: 0;
      background: transparent;
      color: inherit;
      position: relative;
    }

    .user-button::before {
      content: "";
      position: absolute;
      top: 5px;
      left: 14px;
      width: 14px;
      height: 14px;
      background: currentColor;
      border-radius: 50%;
    }

    .user-button::after {
      content: "";
      position: absolute;
      left: 8px;
      bottom: 6px;
      width: 26px;
      height: 14px;
      background: currentColor;
      border-radius: 14px 14px 2px 2px;
    }

    .user-button.admin {
      color: var(--point-dark);
    }

    .user-menu {
      position: absolute;
      top: 50px;
      right: 0;
      min-width: 180px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--white);
      box-shadow: var(--shadow);
      display: none;
      z-index: 20;
    }

    .user-menu.open {
      display: block;
    }

    .user-menu button,
    .user-menu div {
      width: 100%;
      min-height: 36px;
      padding: 8px 10px;
      border: 0;
      border-radius: 4px;
      background: transparent;
      text-align: left;
      color: var(--ink);
      font-size: 14px;
    }

    .user-menu button:hover {
      background: #fff8e8;
    }

    .admin-chip {
      color: var(--point-dark);
      font-weight: 800;
    }

    .hero-space {
      height: clamp(40px, 8vh, 90px);
    }

    .content {
      width: min(1180px, calc(100% - 48px));
      margin: 0 auto 48px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--white);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .control-bar {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) 170px 170px auto;
      gap: 10px;
      align-items: center;
      padding: 18px;
      border-top: 4px solid var(--point);
      border-bottom: 1px solid var(--line);
    }

    .search-wrap {
      position: relative;
    }

    .search-wrap::before {
      content: "";
      position: absolute;
      left: 14px;
      top: 50%;
      width: 13px;
      height: 13px;
      border: 2px solid var(--point);
      border-radius: 50%;
      transform: translateY(-58%);
    }

    .search-wrap::after {
      content: "";
      position: absolute;
      left: 27px;
      top: 25px;
      width: 8px;
      height: 2px;
      background: var(--point);
      transform: rotate(45deg);
      transform-origin: left center;
    }

    input,
    select {
      width: 100%;
      height: 44px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: var(--white);
      color: var(--ink);
      font-size: 14px;
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: var(--point);
      box-shadow: 0 0 0 3px rgba(218, 173, 65, 0.18);
    }

    .search-wrap input {
      padding: 0 14px 0 44px;
    }

    select {
      padding: 0 12px;
    }

    .upload-label,
    .primary-button {
      height: 44px;
      min-width: 132px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 16px;
      border-radius: 4px;
      border: 1px solid var(--point);
      background: var(--point);
      color: var(--white);
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
    }

    .upload-label:hover,
    .primary-button:hover {
      background: var(--point-dark);
      border-color: var(--point-dark);
    }

    .danger-button {
      height: 44px;
      min-width: auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 10px;
      border: 0;
      border-radius: 4px;
      background: transparent;
      color: #8a6c2f;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    .danger-button:hover {
      background: #fff8e8;
      color: var(--danger);
    }

    .danger-button:disabled {
      cursor: wait;
      opacity: 0.58;
    }

    .upload-form {
      display: none;
    }

    body.admin-mode .upload-form {
      display: inline-flex;
    }

    .delete-scope {
      display: none;
      align-items: center;
      gap: 4px;
    }

    body.admin-mode .delete-scope {
      display: inline-flex;
    }

    .delete-scope select {
      height: 44px;
      min-width: 136px;
      border-color: #eadfca;
      color: #6f5728;
      font-size: 13px;
      background: #fffdf8;
    }

    .secondary-button {
      height: 40px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: var(--white);
      color: var(--ink);
      font-weight: 700;
    }

    input[type="file"] {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .status {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 18px;
      color: var(--muted);
      font-size: 13px;
      background: var(--white);
      border-bottom: 1px solid var(--line);
    }

    .status strong {
      color: var(--point-dark);
    }

    .notice {
      margin: 14px 0 0;
      padding: 12px 14px;
      border-radius: 4px;
      border: 1px solid rgba(218, 173, 65, 0.45);
      background: rgba(218, 173, 65, 0.09);
      color: #79570c;
      font-size: 14px;
      display: none;
    }

    .table-scroll {
      overflow: auto;
      max-height: 520px;
      min-height: 330px;
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 14px;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 1;
      padding: 12px;
      text-align: left;
      color: #222;
      background: #f8f4ea;
      border-bottom: 1px solid var(--line);
      white-space: nowrap;
    }

    th,
    td {
      padding: 12px;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
    }

    tbody tr:hover {
      background: #fffaf0;
    }

    tbody tr.data-row {
      cursor: pointer;
    }

    td.num,
    th.num {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    td.product {
      min-width: 360px;
      max-width: 620px;
      line-height: 1.45;
    }

    td.company {
      min-width: 130px;
      white-space: nowrap;
      font-weight: 800;
    }

    td.sheet {
      min-width: 160px;
      color: var(--muted);
    }

    .admin-col {
      display: none;
      width: 126px;
      min-width: 126px;
      text-align: right;
    }

    body.admin-mode .admin-col {
      display: table-cell;
    }

    .row-actions {
      display: flex;
      gap: 6px;
      justify-content: flex-end;
    }

    .small-button {
      min-height: 30px;
      padding: 0 9px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: var(--white);
      color: var(--ink);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .small-button:hover {
      border-color: var(--point);
      color: var(--point-dark);
    }

    .small-button.danger {
      color: var(--danger);
    }

    .empty {
      min-height: 330px;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
      padding: 32px;
    }

    .empty strong {
      display: block;
      margin-bottom: 8px;
      color: var(--ink);
      font-size: 18px;
    }

    .loading {
      pointer-events: none;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(17, 17, 17, 0.35);
      backdrop-filter: blur(5px);
      z-index: 50;
    }

    .modal-backdrop.open {
      display: flex;
    }

    .modal {
      width: min(480px, 100%);
      border-radius: 8px;
      background: var(--white);
      box-shadow: 0 20px 60px rgba(17, 17, 17, 0.22);
      overflow: hidden;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      border-top: 4px solid var(--point);
      border-bottom: 1px solid var(--line);
    }

    .modal-header strong {
      font-size: 18px;
    }

    .close-button {
      width: 32px;
      height: 32px;
      border: 0;
      background: transparent;
      color: var(--muted);
      font-size: 24px;
      line-height: 1;
    }

    .modal-body {
      padding: 18px;
    }

    .modal.calculator {
      width: min(760px, 100%);
    }

    .upload-result {
      display: grid;
      gap: 12px;
      color: var(--ink);
      line-height: 1.5;
    }

    .upload-result strong {
      font-size: 18px;
    }

    .upload-result dl {
      display: grid;
      grid-template-columns: 88px minmax(0, 1fr);
      gap: 8px 12px;
      margin: 0;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fcfcfc;
    }

    .upload-result dt {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .upload-result dd {
      margin: 0;
      overflow-wrap: anywhere;
      font-weight: 700;
    }

    .calc-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(180px, 240px);
      gap: 12px;
      align-items: end;
      margin-bottom: 14px;
    }

    .calc-meta {
      display: grid;
      gap: 8px;
      min-width: 0;
    }

    .calc-meta-row {
      display: grid;
      grid-template-columns: 82px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
      min-height: 24px;
    }

    .calc-meta-row span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .calc-meta-row strong {
      color: var(--ink);
      font-size: 14px;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .calc-title {
      min-width: 0;
    }

    .calc-title strong {
      display: block;
      font-size: 16px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .calc-title span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
    }

    .calc-table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
    }

    .calc-table {
      min-width: 640px;
      font-size: 13px;
    }

    .calc-table th,
    .calc-table td {
      padding: 12px;
      border-right: 1px solid var(--line);
    }

    .calc-table th:last-child,
    .calc-table td:last-child {
      border-right: 0;
    }

    .calc-table tbody tr:nth-child(odd) {
      background: #fffdf8;
    }

    .calc-table .year-label {
      width: 92px;
      font-weight: 800;
      color: #4b5563;
    }

    .calc-table tfoot td {
      background: #fcfcfc;
      font-weight: 800;
    }

    .calc-total {
      margin-top: 12px;
      color: var(--point-dark);
      font-size: 15px;
      font-weight: 800;
      text-align: right;
    }

    .form-grid {
      display: grid;
      gap: 12px;
    }

    .form-grid.two {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    label.field {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    label.field input {
      color: var(--ink);
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 16px;
    }

    .error-text {
      min-height: 18px;
      margin-top: 10px;
      color: var(--danger);
      font-size: 13px;
    }

    @media (max-width: 920px) {
      .app-header {
        height: auto;
        align-items: flex-start;
        padding: 18px;
      }

      .brand-logo {
        width: 226px;
      }

      .hero-space {
        height: 28px;
      }

      .control-bar {
        grid-template-columns: 1fr;
      }

    }

    @media (max-width: 560px) {
      .content {
        width: calc(100% - 24px);
      }

      .brand-logo {
        width: 202px;
      }

      .status {
        display: block;
      }

      .status span {
        display: block;
        margin-top: 6px;
      }

      td.product {
        min-width: 280px;
      }

      .form-grid.two {
        grid-template-columns: 1fr;
      }

      .calc-head {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="app-header">
      <div class="brand" aria-label="한국보험금융">
        <img class="brand-logo" src="assets/kif-logo.png" alt="한국보험금융 KOREA INSURANCE & FINANCE">
      </div>
      <div class="header-actions">
        <span id="loginBadge" class="login-badge">로그인됨</span>
        <button id="userButton" class="user-button" type="button" aria-label="사용자 메뉴"></button>
        <div id="userMenu" class="user-menu">
          <div id="adminStatus">로그인 필요</div>
          <button id="loginMenuButton" type="button">로그인</button>
          <button id="viewerModeButton" type="button" hidden>조회 모드 전환</button>
          <button id="logoutMenuButton" type="button" hidden>로그아웃</button>
        </div>
      </div>
    </header>

    <div class="hero-space"></div>

    <main class="content">
      <section class="panel" aria-label="수수료 조회">
        <div class="control-bar">
          <div class="search-wrap">
            <input id="searchInput" type="search" placeholder="회사명 또는 상품명 검색" autocomplete="off">
          </div>
          <select id="companyFilter"><option value="">전체 회사</option></select>
          <select id="sourceFilter"><option value="">전체 구분</option></select>
          <form id="uploadForm" class="upload-form" action="/upload" method="post" enctype="multipart/form-data">
            <label class="upload-label" for="fileInput">엑셀 업로드</label>
            <input id="csrfToken" name="csrf" type="hidden">
            <input id="fileInput" name="file" type="file" accept=".xlsx,.xlsm,.xltx,.xltm">
          </form>
          <div class="delete-scope">
            <select id="deleteScopeSelect">
              <option value="">전체 삭제</option>
            </select>
            <button id="clearUploadButton" class="danger-button" type="button">삭제</button>
          </div>
        </div>

        <div class="status">
          <div id="statusText">파일을 업로드하면 표가 표시됩니다.</div>
          <span id="fileName">선택된 파일 없음</span>
        </div>

        <div class="table-scroll">
          <table id="resultTable">
            <thead>
              <tr>
                <th>회사</th>
                <th>상품</th>
                <th class="num">1차년</th>
                <th class="num">2차년</th>
                <th class="num">3차년</th>
                <th class="num">4차년</th>
                <th class="num">총수수료</th>
                <th>구분</th>
                <th class="admin-col">관리</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
          <div id="emptyState" class="empty">
            <div>
              <strong>로그인 후 조회할 수 있습니다</strong>
              안내받은 회사 계정으로 로그인하면 수수료 표가 표시됩니다.
            </div>
          </div>
        </div>
      </section>
      <div id="notice" class="notice"></div>
    </main>
  </div>

  <div id="loginModal" class="modal-backdrop" role="dialog" aria-modal="true" aria-label="관리자 로그인">
    <div class="modal">
      <div class="modal-header">
        <strong>관리자 로그인</strong>
        <button class="close-button" type="button" data-close="loginModal" aria-label="닫기">&times;</button>
      </div>
      <form id="loginForm" class="modal-body">
        <div class="form-grid">
          <label class="field">아이디<input id="adminId" autocomplete="username"></label>
          <label class="field">비밀번호<input id="adminPassword" type="password" autocomplete="current-password"></label>
        </div>
        <div id="loginError" class="error-text"></div>
        <div class="modal-actions">
          <button class="secondary-button" type="button" data-close="loginModal">취소</button>
          <button class="primary-button" type="submit">로그인</button>
        </div>
      </form>
    </div>
  </div>

  <div id="editModal" class="modal-backdrop" role="dialog" aria-modal="true" aria-label="수수료 수정">
    <div class="modal">
      <div class="modal-header">
        <strong>수수료 수정</strong>
        <button class="close-button" type="button" data-close="editModal" aria-label="닫기">&times;</button>
      </div>
      <form id="editForm" class="modal-body">
        <input id="editId" type="hidden">
        <div class="form-grid">
          <label class="field">회사<input id="editCompany" required></label>
          <label class="field">상품<input id="editProduct" required></label>
          <label class="field">구분<input id="editSource" required></label>
        </div>
        <div class="form-grid two" style="margin-top: 12px;">
          <label class="field">1차년<input id="editYear1" type="number" step="0.001"></label>
          <label class="field">2차년<input id="editYear2" type="number" step="0.001"></label>
          <label class="field">3차년<input id="editYear3" type="number" step="0.001"></label>
          <label class="field">4차년<input id="editYear4" type="number" step="0.001"></label>
        </div>
        <div class="modal-actions">
          <button class="secondary-button" type="button" data-close="editModal">취소</button>
          <button class="primary-button" type="submit">저장</button>
        </div>
      </form>
    </div>
  </div>

  <div id="calcModal" class="modal-backdrop" role="dialog" aria-modal="true" aria-label="수수료 계산">
    <div class="modal calculator">
      <div class="modal-header">
        <strong>수수료 계산</strong>
        <button class="close-button" type="button" data-close="calcModal" aria-label="닫기">&times;</button>
      </div>
      <div class="modal-body">
        <div class="calc-head">
          <div id="calcTitle" class="calc-meta"></div>
          <label class="field">금액<input id="calcAmount" inputmode="decimal" autocomplete="off"></label>
        </div>
        <div id="calcError" class="error-text"></div>
        <div class="calc-table-wrap">
          <table class="calc-table">
            <thead>
              <tr>
                <th>연차</th>
                <th class="num">수수료율</th>
                <th class="num">계산 금액</th>
              </tr>
            </thead>
            <tbody id="calcRows"></tbody>
          </table>
        </div>
        <div id="calcTotal" class="calc-total"></div>
      </div>
    </div>
  </div>

  <div id="uploadResultModal" class="modal-backdrop" role="dialog" aria-modal="true" aria-label="엑셀 업로드 완료">
    <div class="modal">
      <div class="modal-header">
        <strong id="uploadResultTitle">엑셀 업로드 완료</strong>
        <button class="close-button" type="button" data-close="uploadResultModal" aria-label="닫기">&times;</button>
      </div>
      <div class="modal-body">
        <div class="upload-result">
          <strong id="uploadResultMessage">엑셀 파일을 불러왔습니다.</strong>
          <dl>
            <dt>파일명</dt>
            <dd id="uploadResultFile">-</dd>
            <dt>추가 행</dt>
            <dd id="uploadResultAdded">0건</dd>
            <dt>전체 행</dt>
            <dd id="uploadResultTotal">0건</dd>
          </dl>
        </div>
        <div class="modal-actions">
          <button class="primary-button" type="button" data-close="uploadResultModal">확인</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const state = { rows: [], filtered: [], fileName: "", authenticated: false, admin: false, csrf: "" };
    let nextRowId = 1;
    let activeCalcRow = null;

    const fileInput = document.getElementById("fileInput");
    const clearUploadButton = document.getElementById("clearUploadButton");
    const deleteScopeSelect = document.getElementById("deleteScopeSelect");
    const csrfToken = document.getElementById("csrfToken");
    const searchInput = document.getElementById("searchInput");
    const companyFilter = document.getElementById("companyFilter");
    const sourceFilter = document.getElementById("sourceFilter");
    const tableBody = document.getElementById("tableBody");
    const emptyState = document.getElementById("emptyState");
    const notice = document.getElementById("notice");
    const fileName = document.getElementById("fileName");
    const statusText = document.getElementById("statusText");
    const panel = document.querySelector(".panel");
    const userButton = document.getElementById("userButton");
    const userMenu = document.getElementById("userMenu");
    const adminStatus = document.getElementById("adminStatus");
    const loginMenuButton = document.getElementById("loginMenuButton");
    const viewerModeButton = document.getElementById("viewerModeButton");
    const logoutMenuButton = document.getElementById("logoutMenuButton");
    const loginModal = document.getElementById("loginModal");
    const editModal = document.getElementById("editModal");
    const calcModal = document.getElementById("calcModal");
    const uploadResultModal = document.getElementById("uploadResultModal");
    const loginForm = document.getElementById("loginForm");
    const editForm = document.getElementById("editForm");
    const loginError = document.getElementById("loginError");
    const uploadResultTitle = document.getElementById("uploadResultTitle");
    const uploadResultMessage = document.getElementById("uploadResultMessage");
    const uploadResultFile = document.getElementById("uploadResultFile");
    const uploadResultAdded = document.getElementById("uploadResultAdded");
    const uploadResultTotal = document.getElementById("uploadResultTotal");
    const calcTitle = document.getElementById("calcTitle");
    const calcAmount = document.getElementById("calcAmount");
    const calcRows = document.getElementById("calcRows");
    const calcError = document.getElementById("calcError");
    const calcTotal = document.getElementById("calcTotal");

    const text = (value) => String(value ?? "").replace(/\s+/g, " ").trim();
    const number = (value) => Number.isFinite(Number(value)) ? Number(value) : 0;

    const formatNumber = (value) => {
      const num = number(value);
      if (Math.abs(num) < 100 && !Number.isInteger(num)) {
        return num.toLocaleString("ko-KR", { maximumFractionDigits: 1 });
      }
      return num.toLocaleString("ko-KR", { maximumFractionDigits: 0 });
    };

    const formatCell = (row, key) => row[`${key}Display`] || formatNumber(row[key]);
    const formatMoney = (value) => Math.round(number(value)).toLocaleString("ko-KR");

    const formatPercentRate = (value) => {
      const rate = number(value) * 100;
      return `${rate.toLocaleString("ko-KR", { minimumFractionDigits: 1, maximumFractionDigits: 1 })}%`;
    };

    const hasPercentDisplay = (row) =>
      ["year1Display", "year2Display", "year3Display", "year4Display"].some((key) => String(row[key] || "").includes("%"));

    function parseAmount(value) {
      const raw = text(value).replace(/,/g, "").replace(/\s+/g, "");
      if (!raw) return 0;
      if (/^\d+(\.\d+)?$/.test(raw)) return Number(raw);
      const unitMap = {
        "억": 100000000,
        "천만원": 10000000,
        "백만원": 1000000,
        "십만원": 100000,
        "만원": 10000,
        "만": 10000,
        "천원": 1000,
        "천": 1000,
        "백원": 100,
        "백": 100,
        "십원": 10,
        "십": 10,
        "원": 1
      };
      const pattern = /(\d+(?:\.\d+)?)(천만원|백만원|십만원|만원|천원|백원|십원|억|만|천|백|십|원)?/g;
      let total = 0;
      let matched = "";
      let match;
      while ((match = pattern.exec(raw))) {
        matched += match[0];
        total += Number(match[1]) * (unitMap[match[2] || "원"] || 1);
      }
      return matched === raw ? total : 0;
    }

    function rateText(row, key) {
      return row[`${key}Display`] || (hasPercentDisplay(row) ? formatPercentRate(row[key]) : formatNumber(row[key]));
    }

    function escapeHtml(value) {
      return text(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function setAuthMode(isAuthenticated, isAdmin) {
      state.authenticated = Boolean(isAuthenticated);
      state.admin = Boolean(isAdmin);
      if (!state.authenticated) {
        state.csrf = "";
      }
      csrfToken.value = state.csrf;
      document.body.classList.toggle("auth-mode", state.authenticated);
      document.body.classList.toggle("admin-mode", state.admin);
      userButton.classList.toggle("admin", state.admin);
      adminStatus.innerHTML = state.admin
        ? '<span class="admin-chip">관리자 모드</span>'
        : state.authenticated
          ? "조회 모드"
          : "로그인 필요";
      loginMenuButton.hidden = state.admin;
      loginMenuButton.textContent = state.authenticated ? "관리자 로그인" : "로그인";
      viewerModeButton.hidden = !state.admin;
      logoutMenuButton.hidden = !state.authenticated;
      render();
    }

    async function loadSession() {
      const response = await fetch("/api/session");
      const payload = await response.json();
      state.csrf = payload.csrf || "";
      setAuthMode(payload.authenticated, payload.admin);
    }

    async function loadServerData() {
      const response = await fetch("/api/data");
      const payload = await response.json();
      if (!response.ok) {
        throw new Error(payload.error || "데이터를 불러오지 못했습니다.");
      }
      loadRowsFromPayload(payload);
    }

    function openModal(modal) {
      modal.classList.add("open");
    }

    function closeModal(modal) {
      modal.classList.remove("open");
    }

    function showUploadResult({ ok, file, addedRows, totalRows, message }) {
      uploadResultTitle.textContent = ok ? "엑셀 업로드 완료" : "엑셀 업로드 실패";
      uploadResultMessage.textContent = message;
      uploadResultFile.textContent = file || "-";
      uploadResultAdded.textContent = `${Number(addedRows || 0).toLocaleString("ko-KR")}건`;
      uploadResultTotal.textContent = `${Number(totalRows || 0).toLocaleString("ko-KR")}건`;
      openModal(uploadResultModal);
    }

    function rebuildFilters(rows) {
      const currentCompany = companyFilter.value;
      const currentSource = sourceFilter.value;
      const companies = [...new Set(rows.map((row) => row.company))].sort((a, b) => a.localeCompare(b, "ko"));
      const sources = [...new Set(rows.map((row) => row.source))].sort((a, b) => a.localeCompare(b, "ko"));
      companyFilter.innerHTML = '<option value="">전체 회사</option>' + companies.map((value) => `<option>${escapeHtml(value)}</option>`).join("");
      sourceFilter.innerHTML = '<option value="">전체 구분</option>' + sources.map((value) => `<option>${escapeHtml(value)}</option>`).join("");
      deleteScopeSelect.innerHTML = '<option value="">전체 삭제</option>' + sources.map((value) => `<option value="${escapeHtml(value)}">${escapeHtml(value)} 삭제</option>`).join("");
      if (companies.includes(currentCompany)) companyFilter.value = currentCompany;
      if (sources.includes(currentSource)) sourceFilter.value = currentSource;
    }

    function applyFilters() {
      const query = searchInput.value.trim().toLowerCase();
      const company = companyFilter.value;
      const source = sourceFilter.value;
      state.filtered = state.rows.filter((row) => {
        const matchesQuery = !query || `${row.company} ${row.product}`.toLowerCase().includes(query);
        const matchesCompany = !company || row.company === company;
        const matchesSource = !source || row.source === source;
        return matchesQuery && matchesCompany && matchesSource;
      });
      render();
    }

    function render() {
      tableBody.innerHTML = state.filtered.map((row) => `
        <tr class="data-row" data-id="${row.id}">
          <td class="company">${escapeHtml(row.company)}</td>
          <td class="product">${escapeHtml(row.product)}</td>
          <td class="num">${escapeHtml(formatCell(row, "year1"))}</td>
          <td class="num">${escapeHtml(formatCell(row, "year2"))}</td>
          <td class="num">${escapeHtml(formatCell(row, "year3"))}</td>
          <td class="num">${escapeHtml(formatCell(row, "year4"))}</td>
          <td class="num"><strong>${escapeHtml(formatCell(row, "total"))}</strong></td>
          <td class="sheet">${escapeHtml(row.source)}</td>
          <td class="admin-col">
            ${state.admin ? `
              <div class="row-actions">
                <button class="small-button" type="button" data-action="edit" data-id="${row.id}">수정</button>
                <button class="small-button danger" type="button" data-action="delete" data-id="${row.id}">삭제</button>
              </div>
            ` : ""}
          </td>
        </tr>
      `).join("");

      emptyState.style.display = state.filtered.length ? "none" : "grid";
      if (state.fileName && state.rows.length) {
        statusText.innerHTML = `<strong>${state.filtered.length.toLocaleString("ko-KR")}</strong>건 표시 중${state.admin ? " · 관리자 수정 가능" : ""}`;
      }
    }

    function clearCurrentData(nextFileName) {
      state.rows = [];
      state.filtered = [];
      state.fileName = nextFileName || "";
      nextRowId = 1;
      fileName.textContent = nextFileName || "선택된 파일 없음";
      searchInput.value = "";
      companyFilter.innerHTML = '<option value="">전체 회사</option>';
      sourceFilter.innerHTML = '<option value="">전체 구분</option>';
      deleteScopeSelect.innerHTML = '<option value="">전체 삭제</option>';
      notice.style.display = "none";
      statusText.textContent = nextFileName ? "새 파일을 읽는 중입니다." : "파일을 업로드하면 표가 표시됩니다.";
      render();
    }

    function loadRowsFromPayload(payload) {
      if (payload.error) {
        throw new Error(payload.error);
      }

      nextRowId = 1;
      state.rows = payload.rows.map((row) => {
        const year1 = number(row.year1);
        const year2 = number(row.year2);
        const year3 = number(row.year3);
        const year4 = number(row.year4);
        const total = year1 + year2 + year3 + year4;
        const normalized = { ...row, year1, year2, year3, year4, total, id: nextRowId++ };
        if (!normalized.totalDisplay && hasPercentDisplay(normalized)) {
          normalized.totalDisplay = formatPercentRate(total);
        }
        return normalized;
      }).sort((a, b) =>
        a.company.localeCompare(b.company, "ko") ||
        a.product.localeCompare(b.product, "ko") ||
        a.source.localeCompare(b.source, "ko")
      );
      state.fileName = payload.fileName || "업로드된 엑셀 파일";
      fileName.textContent = state.fileName;
      rebuildFilters(state.rows);
      applyFilters();

      if (state.rows.length) {
        notice.style.display = "none";
      } else {
        notice.textContent = payload.message || "인식 가능한 수수료 표를 찾지 못했습니다. 생보 예시표 또는 손보 원장 형식의 헤더가 포함된 파일인지 확인해 주세요.";
        notice.style.display = "block";
        statusText.textContent = "표시할 데이터가 없습니다.";
      }
    }

    function loadInitialUpload() {
      const payload = window.__INITIAL_UPLOAD__;
      if (!payload) return;
      if (payload.error) {
        clearCurrentData("");
        notice.textContent = `파일을 읽는 중 오류가 발생했습니다. ${payload.error}`;
        notice.style.display = "block";
        statusText.textContent = "업로드 실패";
        return;
      }
      if (payload.rows && payload.rows.length) {
        loadRowsFromPayload(payload);
      } else if (payload.message && payload.message !== "로그인 후 조회할 수 있습니다.") {
        notice.textContent = payload.message;
        notice.style.display = "block";
      }
    }

    function handleFile(file) {
      if (!state.admin) {
        fileInput.value = "";
        notice.textContent = "관리자 로그인 후 엑셀을 업로드할 수 있습니다.";
        notice.style.display = "block";
        return;
      }
      state.fileName = file.name;
      fileName.textContent = file.name;
      csrfToken.value = state.csrf;
      panel.classList.add("loading");
      notice.textContent = "엑셀 파일을 서버에 보내고 있습니다. 잠시만 기다려 주세요.";
      notice.style.display = "block";
      statusText.innerHTML = '<strong>업로드 중</strong> · 엑셀 파일을 서버에 보내고 있습니다.';
      const formData = new FormData();
      formData.append("file", file);
      fetch("/api/upload", {
        method: "POST",
        headers: { "X-CSRF-Token": state.csrf },
        body: formData
      })
        .then(async (response) => {
          const payload = await response.json();
          if (!response.ok) throw new Error(payload.error || "엑셀 파일을 읽지 못했습니다.");
          loadRowsFromPayload({ ...payload, fileName: file.name });
          showUploadResult({
            ok: true,
            file: file.name,
            addedRows: payload.addedRows || 0,
            totalRows: state.rows.length,
            message: "엑셀 파일을 불러왔습니다."
          });
          notice.textContent = `${file.name} 데이터가 기존 목록에 추가되었습니다.`;
          notice.style.display = "block";
        })
        .catch((error) => {
          clearCurrentData("");
          notice.textContent = `파일을 읽는 중 오류가 발생했습니다. ${error.message}`;
          notice.style.display = "block";
          statusText.textContent = "업로드 실패";
          showUploadResult({
            ok: false,
            file: file.name,
            addedRows: 0,
            totalRows: state.rows.length,
            message: `파일을 읽지 못했습니다. ${error.message}`
          });
        })
        .finally(() => {
          panel.classList.remove("loading");
          fileInput.value = "";
        });
    }

    function openEdit(rowId) {
      if (!state.admin) return;
      const row = state.rows.find((item) => item.id === rowId);
      if (!row) return;
      document.getElementById("editId").value = row.id;
      document.getElementById("editCompany").value = row.company;
      document.getElementById("editProduct").value = row.product;
      document.getElementById("editSource").value = row.source;
      document.getElementById("editYear1").value = row.year1;
      document.getElementById("editYear2").value = row.year2;
      document.getElementById("editYear3").value = row.year3;
      document.getElementById("editYear4").value = row.year4;
      openModal(editModal);
    }

    function renderCalculator() {
      if (!activeCalcRow) return;
      const amount = parseAmount(calcAmount.value);
      const hasAmount = amount > 0;
      calcError.textContent = calcAmount.value && !hasAmount ? "금액을 숫자 또는 10만원 형식으로 입력해 주세요." : "";
      const years = ["year1", "year2", "year3", "year4"];
      const calculated = Object.fromEntries(years.map((key) => [key, amount * number(activeCalcRow[key])]));
      const totalCalculated = years.reduce((sum, key) => sum + calculated[key], 0);
      const labels = { year1: "1차년", year2: "2차년", year3: "3차년", year4: "4차년" };
      calcRows.innerHTML = years.map((key) => `
        <tr>
          <td class="year-label">${labels[key]}</td>
          <td class="num">${escapeHtml(rateText(activeCalcRow, key))}</td>
          <td class="num">${hasAmount ? formatMoney(calculated[key]) : ""}</td>
        </tr>
      `).join("") + `
        <tr>
          <td class="year-label">총 수수료</td>
          <td class="num"><strong>${escapeHtml(formatCell(activeCalcRow, "total"))}</strong></td>
          <td class="num"><strong>${hasAmount ? formatMoney(totalCalculated) : ""}</strong></td>
        </tr>
      `;
      calcTotal.textContent = hasAmount ? `총 수수료 계산 금액 ${formatMoney(totalCalculated)}원` : "";
    }

    function openCalculator(rowId) {
      const row = state.rows.find((item) => item.id === rowId);
      if (!row) return;
      activeCalcRow = row;
      calcTitle.innerHTML = `
        <div class="calc-meta-row"><span>회사</span><strong>${escapeHtml(row.company)}</strong></div>
        <div class="calc-meta-row"><span>상품명</span><strong>${escapeHtml(row.product)}</strong></div>
        <div class="calc-meta-row"><span>엑셀 시트</span><strong>${escapeHtml(row.source)}</strong></div>
      `;
      calcAmount.value = "";
      calcError.textContent = "";
      renderCalculator();
      openModal(calcModal);
      setTimeout(() => calcAmount.focus(), 0);
    }

    function deleteRow(rowId) {
      if (!state.admin) return;
      const row = state.rows.find((item) => item.id === rowId);
      if (!row) return;
      if (!confirm(`삭제하시겠습니까?\n${row.company} / ${row.product}`)) return;
      state.rows = state.rows.filter((item) => item.id !== rowId);
      rebuildFilters(state.rows);
      applyFilters();
    }

    userButton.addEventListener("click", () => {
      userMenu.classList.toggle("open");
    });

    document.addEventListener("click", (event) => {
      if (!event.target.closest(".header-actions")) userMenu.classList.remove("open");
    });

    loginMenuButton.addEventListener("click", () => {
      userMenu.classList.remove("open");
      loginError.textContent = "";
      document.getElementById("adminId").value = "";
      document.getElementById("adminPassword").value = "";
      openModal(loginModal);
      setTimeout(() => document.getElementById("adminId").focus(), 0);
    });

    viewerModeButton.addEventListener("click", async () => {
      viewerModeButton.disabled = true;
      viewerModeButton.textContent = "전환 중";
      try {
        const response = await fetch("/api/switch-viewer", {
          method: "POST",
          headers: { "X-CSRF-Token": state.csrf }
        });
        const payload = await response.json();
        if (!response.ok) {
          alert(payload.error || "조회 모드로 전환하지 못했습니다.");
          return;
        }
        state.csrf = payload.csrf || "";
        setAuthMode(true, false);
        userMenu.classList.remove("open");
      } catch (error) {
        alert("서버에 연결하지 못했습니다. 페이지를 새로고침한 뒤 다시 시도해 주세요.");
      } finally {
        viewerModeButton.disabled = false;
        viewerModeButton.textContent = "조회 모드 전환";
      }
    });

    logoutMenuButton.addEventListener("click", async () => {
      await fetch("/api/logout", { method: "POST" });
      userMenu.classList.remove("open");
      window.location.reload();
    });

    loginForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      loginError.textContent = "";
      const submitButton = loginForm.querySelector('button[type="submit"]');
      submitButton.disabled = true;
      submitButton.textContent = "로그인 중";
      try {
        const response = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            id: document.getElementById("adminId").value.trim(),
            password: document.getElementById("adminPassword").value
          })
        });
        const payload = await response.json();
        if (!response.ok) {
          loginError.textContent = payload.error || "로그인에 실패했습니다.";
          return;
        }
        state.csrf = payload.csrf || "";
        setAuthMode(true, Boolean(payload.admin));
        await loadServerData();
        closeModal(loginModal);
      } catch (error) {
        loginError.textContent = "서버에 연결하지 못했습니다. 페이지를 새로고침한 뒤 다시 로그인해 주세요.";
      } finally {
        submitButton.disabled = false;
        submitButton.textContent = "로그인";
      }
    });

    editForm.addEventListener("submit", (event) => {
      event.preventDefault();
      if (!state.admin) return;
      const rowId = Number(document.getElementById("editId").value);
      const row = state.rows.find((item) => item.id === rowId);
      if (!row) return;
      row.company = text(document.getElementById("editCompany").value);
      row.product = text(document.getElementById("editProduct").value);
      row.source = text(document.getElementById("editSource").value);
      row.year1 = number(document.getElementById("editYear1").value);
      row.year2 = number(document.getElementById("editYear2").value);
      row.year3 = number(document.getElementById("editYear3").value);
      row.year4 = number(document.getElementById("editYear4").value);
      row.total = row.year1 + row.year2 + row.year3 + row.year4;
      delete row.year1Display;
      delete row.year2Display;
      delete row.year3Display;
      delete row.year4Display;
      delete row.totalDisplay;
      rebuildFilters(state.rows);
      applyFilters();
      closeModal(editModal);
    });

    document.querySelectorAll("[data-close]").forEach((button) => {
      button.addEventListener("click", () => closeModal(document.getElementById(button.dataset.close)));
    });

    document.querySelectorAll(".modal-backdrop").forEach((modal) => {
      modal.addEventListener("click", (event) => {
        if (event.target === modal) closeModal(modal);
      });
    });

    tableBody.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-action]");
      if (button) {
        const rowId = Number(button.dataset.id);
        if (button.dataset.action === "edit") openEdit(rowId);
        if (button.dataset.action === "delete") deleteRow(rowId);
        return;
      }
      const row = event.target.closest("tr[data-id]");
      if (row) openCalculator(Number(row.dataset.id));
    });

    calcAmount.addEventListener("input", renderCalculator);

    fileInput.addEventListener("click", () => {
      fileInput.value = "";
    });

    fileInput.addEventListener("change", (event) => {
      const file = event.target.files && event.target.files[0];
      if (!file) return;
      handleFile(file);
    });

    clearUploadButton.addEventListener("click", async () => {
      if (!state.admin) return;
      if (!state.rows.length && !state.fileName) {
        notice.textContent = "삭제할 업로드 데이터가 없습니다.";
        notice.style.display = "block";
        return;
      }
      const source = deleteScopeSelect.value;
      const targetText = source ? `${source} 구분` : "전체";
      if (!window.confirm(`${targetText} 데이터를 삭제할까요?`)) return;
      clearUploadButton.disabled = true;
      clearUploadButton.textContent = "삭제 중";
      try {
        const response = await fetch("/api/clear-upload", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "X-CSRF-Token": state.csrf
          },
          body: JSON.stringify({ source })
        });
        const payload = await response.json();
        if (!response.ok) {
          notice.textContent = payload.error || "업로드 데이터를 삭제하지 못했습니다.";
          notice.style.display = "block";
          return;
        }
        loadRowsFromPayload(payload);
        fileInput.value = "";
        if (!payload.rows.length) clearCurrentData("");
        notice.textContent = payload.message || `${targetText} 데이터가 삭제되었습니다.`;
        notice.style.display = "block";
      } catch (error) {
        notice.textContent = "서버에 연결하지 못했습니다. 페이지를 새로고침한 뒤 다시 시도해 주세요.";
        notice.style.display = "block";
      } finally {
        clearUploadButton.disabled = false;
        clearUploadButton.textContent = "전체 삭제";
      }
    });

    searchInput.addEventListener("input", applyFilters);
    companyFilter.addEventListener("change", applyFilters);
    sourceFilter.addEventListener("change", applyFilters);

    window.addEventListener("load", () => {
      loadInitialUpload();
      loadSession().catch(() => setAuthMode(false, false));
      render();
    });
  </script>
</body>
</html>
